name: read_147

on:
  schedule:
    # 凌晨任务：北京时间每天 00:10（UTC 前一天 16:10）
    - cron: '10 16 * * *'
    # 早间任务：北京时间每天 05:00（UTC 前一天 21:00）
    #- cron: '0 21 * * *'
    # 午间任务：北京时间每天 11:40（UTC 03:40）
    #- cron: '40 3 * * *'
    # 晚间任务：北京时间每天 22:00（UTC 14:00）
    #- cron: '0 14 * * *'
  workflow_dispatch:  # 手动触发

# keepalive 保活需要向仓库推送提交的写权限
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-22.04
    environment: read_147  # 指定环境

    steps:

    - name: Set DNS to Google's DNS
      run: |
        echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
        echo "nameserver 8.8.4.4" | sudo tee -a /etc/resolv.conf

    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install certifi==2024.8.30 charset-normalizer==3.4.0 idna==3.10 requests==2.32.3 urllib3==2.2.3

    - name: Run deployment script
      env:
        WXREAD_CURL_BASH: ${{ secrets.WXREAD_CURL_BASH }}
        PUSH_METHOD: ${{ secrets.PUSH_METHOD }}
        PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        WXPUSHER_SPT: ${{ secrets.WXPUSHER_SPT }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        READ_NUM: ${{ vars.READ_NUM }}  # 使用 Repository Variables

      run: |
        python main.py

    # 保活：不依赖第三方 action，接近 60 天不活跃时自动产生一个空提交，防止定时任务被禁用
    - name: Keepalive workflow
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        last=$(git log -1 --format=%ct)
        now=$(date +%s)
        days=$(( (now - last) / 86400 ))
        echo "距上次提交已 ${days} 天"
        if [ "$days" -ge 45 ]; then
          git commit --allow-empty -m "chore: keepalive to prevent scheduled workflow from being disabled"
          git push
          echo "已推送空提交以保活。"
        else
          echo "未满 45 天，跳过保活提交。"
        fi
